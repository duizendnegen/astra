name: CI

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write  # required for OIDC
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            lambda/package-lock.json
            frontend/package-lock.json

      - name: Install lambda deps
        run: npm ci
        working-directory: lambda

      - name: Run lambda tests
        run: npm test
        working-directory: lambda

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

  cdk-diff:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            infra/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install infra deps
        run: npm ci
        working-directory: infra

      - name: Configure AWS credentials (read-only OIDC role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_READONLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: CDK diff
        run: npx cdk diff
        working-directory: infra

  constellation-previews:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            lambda/package-lock.json
            test-harness/package-lock.json

      - name: Configure AWS credentials (read-only OIDC role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_READONLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install lambda deps
        run: npm ci
        working-directory: lambda

      - name: Install test-harness deps
        run: npm ci
        working-directory: test-harness

      - name: Start local service
        run: npm run dev:local &
        working-directory: lambda
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ vars.PINECONE_INDEX_NAME }}
          ICONS_BUCKET_NAME: ${{ vars.ICONS_BUCKET_NAME }}

      - name: Wait for local service on port 3001
        run: |
          for i in $(seq 1 30); do
            curl -sf -X OPTIONS http://localhost:3001/api/constellation -o /dev/null && echo "Service ready" && break
            echo "Waiting for service... ($i/30)"
            sleep 2
          done

      - name: Run test harness for preview words
        run: npx tsx run.ts --words banana,anchor,love,bunny,tree --run-id ci-${{ github.sha }}
        working-directory: test-harness

      - name: Post preview comment
        run: npx tsx post-preview-comment.ts --run-id ci-${{ github.sha }} --pr-number ${{ github.event.pull_request.number }}
        working-directory: test-harness
