<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Space+Grotesk:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .star-field {
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #c6c6cb 100%, transparent),
                radial-gradient(1px 1px at 40px 70px, #8f9095 100%, transparent),
                radial-gradient(2px 2px at 50px 160px, #a7c8ff 100%, transparent),
                radial-gradient(1px 1px at 90px 40px, #c6c6cb 100%, transparent),
                radial-gradient(1.5px 1.5px at 130px 80px, #ffffff 100%, transparent);
            background-repeat: repeat;
            background-size: 200px 200px;
        }
        .glow-filter {
            filter: drop-shadow(0 0 15px rgba(249, 226, 135, 0.15));
        }
    </style>
<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {

                        "inverse-primary": "#50616b",

                        "on-secondary-fixed-variant": "#3f465c",
                        outline: "#8d9195",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-primary-container": "#44555f",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#3a3000",
                        "surface-container-highest": "#2e3447",
                        "inverse-on-surface": "#293042",

<body class="bg-surface text-on-surface font-body selection:bg-tertiary/30">
<div class="fixed inset-0 pointer-events-none opacity-40 star-field z-0"></div>
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-12 py-6 bg-[#111417]/0 pointer-events-none">
<div class="font-headline text-2xl tracking-[0.2em] text-[#c6c6c7] opacity-20 transition-opacity">ASTRA</div>
<div class="flex items-center gap-6 pointer-events-auto">
</div>
</header>
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-6">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-tertiary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="max-w-2xl w-full flex flex-col items-center text-center space-y-16">
<div class="space-y-4">
<div class="w-full max-w-md space-y-12 flex flex-col items-center">
<div class="w-full group relative">
<label class="block font-label text-[10px] tracking-[0.3em] uppercase text-outline/60 mb-4 transition-colors group-focus-within:text-tertiary">
                        Constellation
                    </label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/30 py-4 text-2xl md:text-3xl font-body text-center placeholder:text-outline-variant focus:ring-0 focus:border-tertiary transition-all duration-700 glow-filter outline-none" placeholder="Type a word..." type="text"/>
<div class="absolute -left-12 top-1/2 w-8 h-[0.5px] bg-outline-variant/20 hidden md:block"></div>
<div class="absolute -right-12 top-1/2 w-8 h-[0.5px] bg-outline-variant/20 hidden md:block"></div>
</div>
<button class="group relative px-12 py-4 rounded-full bg-tertiary text-on-tertiary font-label tracking-[0.2em] uppercase text-xs overflow-hidden transition-all duration-500 active:scale-95 shadow-[0_0_30px_rgba(249,226,135,0.3)]">
<span class="relative z-10 flex items-center gap-3">
                        Find
                        <span class="material-symbols-outlined text-sm" data-icon="auto_awesome">auto_awesome</span>
</span>
<div class="absolute inset-0 bg-gradient-to-r from-tertiary to-tertiary-container opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
</button>
</div>
</div>
</main>
<div class="fixed top-1/4 right-[15%] w-1 h-1 bg-tertiary rounded-full shadow-[0_0_15px_#f9e287] animate-pulse"></div>
<div class="fixed bottom-1/3 left-[10%] w-[2px] h-[2px] bg-tertiary-container rounded-full shadow-[0_0_10px_#dcc66e] opacity-60"></div>
<div class="fixed top-[20%] left-[20%] opacity-10">
<svg class="stroke-outline fill-none" height="200" viewBox="0 0 200 200" width="200">
<circle cx="100" cy="100" r="80" stroke-dasharray="4 4" stroke-width="0.5"></circle>
<path d="M100 20 L100 180 M20 100 L180 100" stroke-width="0.5"></path>
</svg>
</div>
